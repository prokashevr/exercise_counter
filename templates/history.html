<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout History</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0d14;
            --surface: #121722;
            --surface-2: #1a2030;
            --border: #242b3d;
            --border-soft: #1e2536;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            --accent: #4ade80;
            --accent-hover: #22c55e;
            --accent-soft: rgba(74, 222, 128, 0.12);
            --radius: 14px;
            --radius-sm: 10px;
            --radius-lg: 20px;
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.35);
            --shadow-lg: 0 24px 60px rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            min-height: 100vh;
            padding: 48px 24px 64px;
            background:
                radial-gradient(1200px 600px at 50% -200px, rgba(74, 222, 128, 0.06), transparent 60%),
                var(--bg);
        }

        .top-nav {
            max-width: 1200px;
            margin: 0 auto 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .nav-btn {
            background: var(--surface);
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 10px 18px;
            font-size: 0.8125rem;
            font-weight: 500;
            border-radius: var(--radius-sm);
            text-decoration: none;
            transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .nav-btn:hover {
            background: var(--surface-2);
            border-color: var(--border-soft);
            color: var(--text);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            background: linear-gradient(180deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 0.9375rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 28px;
            transition: border-color 0.15s ease, transform 0.15s ease;
        }

        .stat-card:hover {
            border-color: var(--border-soft);
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.03em;
            font-variant-numeric: tabular-nums;
        }

        .stat-card:first-child .stat-value { color: var(--accent); }

        .sessions-list {
            display: grid;
            gap: 16px;
        }

        .section-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .session-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 28px;
            transition: border-color 0.15s ease, background 0.15s ease;
        }

        .session-card:hover {
            border-color: var(--border-soft);
            background: var(--surface-2);
        }

        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-soft);
            gap: 16px;
            flex-wrap: wrap;
        }

        .session-date {
            font-size: 0.9375rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .session-total {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
        }

        .session-total .unit {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-left: 6px;
        }

        .rounds-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
            gap: 10px;
        }

        .round-item {
            background: var(--surface-2);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-sm);
            padding: 12px 10px;
            text-align: center;
            transition: border-color 0.15s ease, background 0.15s ease;
        }

        .round-item:hover {
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        .round-label {
            font-size: 0.6875rem;
            color: var(--text-dim);
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .round-value {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }

        .no-data, .loading {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-dim);
            font-size: 0.9375rem;
            font-weight: 500;
        }

        .loading { animation: pulse 1.8s ease-in-out infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        @media (max-width: 640px) {
            body { padding: 32px 16px 48px; }
            h1 { font-size: 1.75rem; }
            .stat-value { font-size: 1.75rem; }
        }
    </style>
</head>
<body>
    <div class="top-nav">
        <a href="/" class="nav-btn">← Workout</a>
        <a href="/reps-counter" class="nav-btn">Reps Counter →</a>
    </div>

    <div class="header">
        <h1>History</h1>
        <div class="subtitle">Performance records across sessions</div>
    </div>

    <div class="container">
        <div class="stats-grid" id="stats-grid" style="display: none;">
            <div class="stat-card">
                <div class="stat-label">Total Sessions</div>
                <div class="stat-value" id="total-sessions">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Jumps</div>
                <div class="stat-value" id="total-jumps">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Per Session</div>
                <div class="stat-value" id="avg-jumps">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Best Session</div>
                <div class="stat-value" id="best-session">0</div>
            </div>
        </div>

        <div id="sessions-wrapper" style="display: none;">
            <div class="section-label">Recent Sessions</div>
            <div id="sessions-list" class="sessions-list"></div>
        </div>

        <div id="loading" class="loading">Loading sessions…</div>
        <div id="no-data" class="no-data" style="display: none;">No workout sessions recorded yet</div>
    </div>

    <script>
        function formatDate(isoString) {
            const date = new Date(isoString);
            const options = {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            return date.toLocaleDateString('en-US', options);
        }

        function loadHistory() {
            fetch('/api/sessions')
                .then(response => response.json())
                .then(data => {
                    const loading = document.getElementById('loading');
                    const sessionsList = document.getElementById('sessions-list');
                    const sessionsWrapper = document.getElementById('sessions-wrapper');
                    const noData = document.getElementById('no-data');
                    const statsGrid = document.getElementById('stats-grid');

                    loading.style.display = 'none';

                    if (data.ok && data.sessions && data.sessions.length > 0) {
                        const sessions = data.sessions;

                        const totalSessions = sessions.length;
                        const totalJumps = sessions.reduce((sum, s) => sum + s.total_jumps, 0);
                        const avgJumps = Math.round(totalJumps / totalSessions);
                        const bestSession = Math.max(...sessions.map(s => s.total_jumps));

                        document.getElementById('total-sessions').textContent = totalSessions;
                        document.getElementById('total-jumps').textContent = totalJumps.toLocaleString();
                        document.getElementById('avg-jumps').textContent = avgJumps;
                        document.getElementById('best-session').textContent = bestSession;

                        statsGrid.style.display = 'grid';
                        sessionsWrapper.style.display = 'block';

                        sessionsList.innerHTML = sessions.map(session => `
                            <div class="session-card">
                                <div class="session-header">
                                    <div class="session-date">${formatDate(session.trained_at)}</div>
                                    <div class="session-total">${session.total_jumps}<span class="unit">jumps</span></div>
                                </div>
                                <div class="rounds-grid">
                                    ${session.rounds.map(round => `
                                        <div class="round-item">
                                            <div class="round-label">Round ${round.round_index}</div>
                                            <div class="round-value">${round.jumps}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('');
                    } else {
                        noData.style.display = 'block';
                    }
                })
                .catch(error => {
                    console.error('Error loading history:', error);
                    document.getElementById('loading').textContent = 'Error loading data';
                });
        }

        loadHistory();
    </script>
</body>
</html>
